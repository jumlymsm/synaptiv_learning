version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd admin-app && npm ci
    build:
      commands:
        - cd admin-app && npm run build
  artifacts:
    baseDirectory: /
    files:
      - 'index.html'
      - 'admin.html'
      - 'aws-config.js'
      - 'logo.jpg'
      - 'portal/**/*'
  cache:
    paths:
      - 'admin-app/node_modules/**/*'
