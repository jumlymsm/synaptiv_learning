version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node --version
        - cd admin-app && npm ci --legacy-peer-deps
    build:
      commands:
        - mkdir -p portal
        - cd admin-app && npx vite build
  artifacts:
    baseDirectory: /
    files:
      - 'index.html'
      - 'admin.html'
      - 'aws-config.js'
      - 'logo.jpg'
      - 'portal/**/*'
  cache:
    paths:
      - 'admin-app/node_modules/**/*'
